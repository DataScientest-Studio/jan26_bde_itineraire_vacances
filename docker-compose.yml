# Cette première partie permet de créer le base commune aux services airflow, ce qui nous permet de ne pas nous répeter par la suite dans notre yml
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  env_file:
    - .env
  environment: &airflow-common-env
    PYTHONUNBUFFERED: "1" # Permet d'avoir les logs en temps réel dans la console
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # On va utiliser le service postgres qui existe déjà
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_postgres:5432/airflow_db
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "voiciunsecretwebserver"
    AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  networks:
    - tourisme_network
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    db_postgres:
      condition: service_healthy

services:
  # --- BASES DE DONNÉES ---
  mongodb:
    image : mongo:7.0
    env_file:
      - .env
    container_name: ${MONGO_CONTAINER_NAME}
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./data/mongo:/data/db
    networks:
      - tourisme_network
  
  db_postgres:
    image: postgres:15
    env_file:
      - .env
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      # Assure-toi que ce script contient : CREATE DATABASE airflow_db;
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tourisme_network

  neo4j:
    image: neo4j:5
    container_name: neo4j_tourisme
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j/logs:/logs
    networks:
      - tourisme_network

  # --- TOOLS & API ---
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    container_name: ${PGADMIN_CONTAINER_NAME}
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db_postgres
    networks:
      - tourisme_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: ${API_CONTAINER_NAME}
    environment:
      DB_PG_HOST: db_postgres
      DB_MDB_HOST: mongodb
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - mongodb
      - db_postgres
      - neo4j
    command: >
      uvicorn main:app_iv
      --host 0.0.0.0
      --port 8000
    networks:
      - tourisme_network

  streamlit:
      build:
        context: ./streamlit
      container_name: streamlit
      env_file:
        - .env
      environment:
        - API_USER=${API_USER}
        - API_PWD=${API_PWD}
        - API_URL=${API_URL}
      ports:
        - "8501:8501"
      depends_on:
        - api
      networks:
        - tourisme_network

  # --- AIRFLOW ---
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: version
    environment:
      # On utilise l'ancre de l'env pour éviter de se repeter
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    hostname: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    hostname: airflow_webserver
    command: scheduler
    restart: always

networks:
  tourisme_network:
    driver: bridge