name: Tests Neo4j + Pytest

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: adminadmin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Neo4j
        run: |
          wget -O neo4j.tar.gz https://dist.neo4j.org/neo4j-community-5.20.0-unix.tar.gz
          tar -xzf neo4j.tar.gz
          mv neo4j-community-* neo4j

      - name: Configure Neo4j
        run: |
          sed -i 's/#dbms.default_listen_address=0.0.0.0/dbms.default_listen_address=0.0.0.0/' neo4j/conf/neo4j.conf
          sed -i 's/#dbms.security.auth_enabled=true/dbms.security.auth_enabled=true/' neo4j/conf/neo4j.conf

      - name: Start Neo4j
        run: |
          neo4j/bin/neo4j start
          sleep 20

      - name: Set Neo4j password
        run: |
          echo "Using password: $NEO4J_PASSWORD"
          neo4j/bin/cypher-shell -u neo4j -p neo4j -d system \
            "ALTER CURRENT USER SET PASSWORD FROM 'neo4j' TO '"$NEO4J_PASSWORD"'"

      - name: Add project root to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB