version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_moussa
    restart: always
    environment:
      POSTGRES_DB: datatourisme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - datatourisme_net

  neo4j:
    image: neo4j:5.17
    container_name: neo4j_moussa
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - datatourisme_net

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: etl_moussa
    restart: on-failure

    environment:
      # Postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: datatourisme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

    depends_on:
      - postgres
      - neo4j

    networks:
      - datatourisme_net

    # IMPORTANT : ne pas lancer automatiquement l'import FULL
    command: ["sleep", "infinity"]

volumes:
  postgres_data:
  neo4j_data:

networks:
  datatourisme_net:




